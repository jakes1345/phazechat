<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiss</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: sans-serif;
    cursor: pointer;
  }
  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .message-text {
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,80,120,0.8), 0 2px 4px rgba(0,0,0,0.5);
    margin-bottom: 20px;
    text-align: center;
    max-width: 80%;
    word-wrap: break-word;
  }
  .from-name {
    color: #ff69b4;
    font-size: 16px;
    margin-top: 10px;
    text-shadow: 0 0 8px rgba(255,105,180,0.6);
  }
  .heart-container {
    position: relative;
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .heart {
    font-size: 72px;
    animation: heartbeat 1.2s ease-in-out infinite;
    filter: drop-shadow(0 0 12px rgba(255,80,120,0.8));
  }
  .lips {
    font-size: 36px;
    position: absolute;
    animation: kiss-pop 1.8s ease-in-out infinite;
    opacity: 0;
  }
  .sparkle {
    position: absolute;
    font-size: 18px;
    animation: sparkle-fly 2s ease-in-out infinite;
    opacity: 0;
    pointer-events: none;
  }
  .sparkle:nth-child(1) { animation-delay: 0s;   top: 10%; left: 70%; }
  .sparkle:nth-child(2) { animation-delay: 0.3s; top: 60%; left: 80%; }
  .sparkle:nth-child(3) { animation-delay: 0.6s; top: 15%; left: 25%; }
  .sparkle:nth-child(4) { animation-delay: 0.9s; top: 70%; left: 15%; }
  .sparkle:nth-child(5) { animation-delay: 1.2s; top: 40%; left: 5%; }
  .sparkle:nth-child(6) { animation-delay: 1.5s; top: 30%; left: 90%; }

  @keyframes heartbeat {
    0%   { transform: scale(1); }
    14%  { transform: scale(1.15); }
    28%  { transform: scale(1); }
    42%  { transform: scale(1.1); }
    70%  { transform: scale(1); }
  }
  @keyframes kiss-pop {
    0%   { opacity: 0; transform: scale(0.3) translate(20px, -20px); }
    20%  { opacity: 1; transform: scale(1.2) translate(20px, -20px); }
    50%  { opacity: 0.8; transform: scale(1) translate(30px, -35px); }
    100% { opacity: 0; transform: scale(0.5) translate(40px, -55px); }
  }
  @keyframes sparkle-fly {
    0%   { opacity: 0; transform: scale(0.5) translateY(0); }
    30%  { opacity: 1; transform: scale(1) translateY(-8px); }
    70%  { opacity: 0.6; transform: scale(0.8) translateY(-16px); }
    100% { opacity: 0; transform: scale(0.3) translateY(-24px); }
  }
  @keyframes fade-in {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }
  .stage { animation: fade-in 0.4s ease-out; }
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="sparkle">&#x2728;</div>
  <div class="sparkle">&#x2728;</div>
  <div class="sparkle">&#x2728;</div>
  <div class="sparkle">&#x2728;</div>
  <div class="sparkle">&#x2728;</div>
  <div class="sparkle">&#x2728;</div>
  <div id="msgText" class="message-text"></div>
  <div class="heart-container">
    <span class="heart">&#x1F497;</span>
    <span class="lips">&#x1F48B;</span>
  </div>
  <div id="fromName" class="from-name"></div>
</div>
<script>
var autoCloseTimer = null;

window.addEventListener('message', function(e) {
  try {
    var data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
    if (data.action === 'kiss') {
      if (data.Message) {
        document.getElementById('msgText').textContent = data.Message;
      }
      if (data.name) {
        document.getElementById('fromName').textContent = 'from ' + data.name;
      }
      if (data.color) {
        document.querySelector('.message-text').style.color = '#' + data.color;
      }
      parent.postMessage(JSON.stringify({action: 'kissLoaded'}), '*');
      autoCloseTimer = setTimeout(function() {
        parent.postMessage(JSON.stringify({action: 'kissDone'}), '*');
      }, 5000);
    }
  } catch(err) {}
}, false);

document.body.addEventListener('click', function() {
  if (autoCloseTimer) clearTimeout(autoCloseTimer);
  parent.postMessage(JSON.stringify({action: 'kissClick'}), '*');
});
</script>
</body>
</html>
