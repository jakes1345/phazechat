<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiss</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    .stage {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .heart {
      font-size: 72px;
      animation: heartbeat 1.2s ease-in-out infinite;
      transform-origin: center;
      filter: drop-shadow(0 0 12px rgba(255, 80, 120, 0.8));
    }

    .lips {
      font-size: 48px;
      position: absolute;
      animation: kiss-pop 1.2s ease-in-out infinite;
      animation-delay: 0.6s;
      opacity: 0;
    }

    @keyframes heartbeat {
      0%   { transform: scale(1); }
      14%  { transform: scale(1.15); }
      28%  { transform: scale(1); }
      42%  { transform: scale(1.1); }
      70%  { transform: scale(1); }
      100% { transform: scale(1); }
    }

    @keyframes kiss-pop {
      0%   { opacity: 0; transform: scale(0.3) translate(20px, -20px); }
      30%  { opacity: 1; transform: scale(1.2) translate(20px, -20px); }
      60%  { opacity: 0.8; transform: scale(1) translate(30px, -35px); }
      100% { opacity: 0; transform: scale(0.5) translate(40px, -55px); }
    }

    .sparkle {
      position: absolute;
      font-size: 18px;
      animation: sparkle-fly 2s ease-in-out infinite;
      opacity: 0;
    }

    .sparkle:nth-child(3)  { animation-delay: 0s;    top: 20%; left: 65%; }
    .sparkle:nth-child(4)  { animation-delay: 0.4s;  top: 60%; left: 75%; }
    .sparkle:nth-child(5)  { animation-delay: 0.8s;  top: 15%; left: 30%; }
    .sparkle:nth-child(6)  { animation-delay: 1.2s;  top: 70%; left: 20%; }
    .sparkle:nth-child(7)  { animation-delay: 1.6s;  top: 40%; left: 10%; }

    @keyframes sparkle-fly {
      0%   { opacity: 0;   transform: scale(0.5) translateY(0); }
      30%  { opacity: 1;   transform: scale(1)   translateY(-8px); }
      70%  { opacity: 0.6; transform: scale(0.8) translateY(-16px); }
      100% { opacity: 0;   transform: scale(0.3) translateY(-24px); }
    }
  </style>
</head>
<body>
  <div class="stage">
    <span class="heart">&#x1F497;</span>
    <span class="lips">&#x1F48B;</span>
    <span class="sparkle">&#x2728;</span>
    <span class="sparkle">&#x2728;</span>
    <span class="sparkle">&#x2728;</span>
    <span class="sparkle">&#x2728;</span>
    <span class="sparkle">&#x2728;</span>
  </div>
</body>
</html>
