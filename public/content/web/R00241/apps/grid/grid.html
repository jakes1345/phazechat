<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grid | xat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    h1 {
      font-size: 16px;
      color: #a0c4ff;
      margin-bottom: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .score-row {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .score-box {
      background: #16213e;
      border: 1px solid #2a2a5e;
      border-radius: 6px;
      padding: 4px 14px;
      text-align: center;
    }
    .score-box .label { color: #7080a0; font-size: 10px; }
    .score-box .val   { color: #a0c4ff; font-size: 15px; font-weight: bold; }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 90px);
      grid-template-rows: repeat(3, 90px);
      gap: 6px;
    }
    .cell {
      background: #16213e;
      border: 2px solid #2a2a5e;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .cell:hover:not(.taken) {
      background: #1c2a50;
      border-color: #4a6fa5;
    }
    .cell.taken { cursor: default; }
    .cell.x-win { background: #1e3a5f; border-color: #58a6ff; }
    .cell.o-win { background: #3a1e1e; border-color: #f85149; }
    .status {
      margin-top: 14px;
      font-size: 14px;
      color: #a0c4ff;
      min-height: 22px;
      text-align: center;
    }
    .status.win-x { color: #58a6ff; }
    .status.win-o { color: #f85149; }
    .status.draw  { color: #d29922; }
    .btn-reset {
      margin-top: 14px;
      background: #16213e;
      border: 1px solid #2a2a5e;
      color: #a0c4ff;
      border-radius: 6px;
      padding: 8px 24px;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    .btn-reset:hover { background: #1c2a50; border-color: #4a6fa5; }
    .turn-indicator {
      margin-top: 8px;
      font-size: 11px;
      color: #7080a0;
    }
  </style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>

  <div class="score-row">
    <div class="score-box">
      <div class="label">X Wins</div>
      <div class="val" id="score-x">0</div>
    </div>
    <div class="score-box">
      <div class="label">Draws</div>
      <div class="val" id="score-d">0</div>
    </div>
    <div class="score-box">
      <div class="label">O Wins</div>
      <div class="val" id="score-o">0</div>
    </div>
  </div>

  <div class="board" id="board"></div>

  <div class="status" id="status">X goes first</div>
  <div class="turn-indicator" id="turn">Your turn</div>
  <button class="btn-reset" onclick="resetGame()">New Game</button>

  <script>
    var board = Array(9).fill(null);
    var current = 'X';
    var gameOver = false;
    var scores = { X: 0, O: 0, D: 0 };
    var WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    function renderBoard() {
      var el = document.getElementById('board');
      el.innerHTML = '';
      for (var i = 0; i < 9; i++) {
        var cell = document.createElement('div');
        cell.className = 'cell' + (board[i] ? ' taken' : '');
        cell.textContent = board[i] === 'X' ? '✕' : board[i] === 'O' ? '◯' : '';
        cell.dataset.i = i;
        if (!board[i] && !gameOver) cell.onclick = handleClick;
        el.appendChild(cell);
      }
    }

    function handleClick(e) {
      var i = parseInt(e.currentTarget.dataset.i);
      if (board[i] || gameOver) return;
      board[i] = current;
      renderBoard();
      checkWin();
    }

    function checkWin() {
      for (var w of WINS) {
        if (board[w[0]] && board[w[0]] === board[w[1]] && board[w[1]] === board[w[2]]) {
          gameOver = true;
          var winner = board[w[0]];
          scores[winner]++;
          updateScoreDisplay();
          // Highlight winning cells
          var cells = document.querySelectorAll('.cell');
          w.forEach(function(i) {
            cells[i].classList.add(winner === 'X' ? 'x-win' : 'o-win');
          });
          var status = document.getElementById('status');
          status.textContent = winner + ' wins!';
          status.className = 'status win-' + winner.toLowerCase();
          document.getElementById('turn').textContent = 'Click "New Game" to play again';
          return;
        }
      }
      if (board.every(Boolean)) {
        gameOver = true;
        scores.D++;
        updateScoreDisplay();
        var status = document.getElementById('status');
        status.textContent = "It's a draw!";
        status.className = 'status draw';
        document.getElementById('turn').textContent = 'Click "New Game" to play again';
        return;
      }
      current = current === 'X' ? 'O' : 'X';
      document.getElementById('status').textContent = current + "'s turn";
      document.getElementById('turn').textContent = '';
    }

    function updateScoreDisplay() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
    }

    function resetGame() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      renderBoard();
      document.getElementById('status').textContent = 'X goes first';
      document.getElementById('status').className = 'status';
      document.getElementById('turn').textContent = 'Your turn';
    }

    renderBoard();
  </script>
</body>
</html>
