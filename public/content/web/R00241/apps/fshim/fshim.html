<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Full Shim | xat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0d1117;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    #content {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #inner-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      background: #0d1117;
    }
    #loading-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      color: #484f58;
      font-size: 13px;
      gap: 12px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #21262d;
      border-top-color: #1f6feb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="content">
    <iframe id="inner-frame"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation-by-user-activation"
      allowfullscreen>
    </iframe>
    <div id="loading-overlay">
      <div class="spinner"></div>
      <span>Loading...</span>
    </div>
  </div>

  <script>
    var currentSrc = null;

    window.addEventListener('message', function(e) {
      var data;
      try { data = JSON.parse(e.data); } catch(_) { return; }
      if (!data) return;

      // OpenByN: load an app by name/number into full shim
      if (data.OpenByN !== undefined) {
        var appName = data.OpenByN;
        if (typeof appName === 'string' && appName) {
          loadApp(appName);
        }
        return;
      }

      // Direct src load
      if (data.src) {
        loadSrc(data.src);
        return;
      }

      // stopOnMessage: unload
      if (data.channel === 'stopOnMessage') {
        unload();
        return;
      }

      // Forward to inner frame
      var frame = document.getElementById('inner-frame');
      if (frame.src && frame.contentWindow) {
        try { frame.contentWindow.postMessage(e.data, '*'); } catch(_) {}
      }
    });

    function loadApp(name) {
      // Resolve relative to current dir convention: apps/{name}/{name}.html
      var base = location.href.replace(/\/fshim\/fshim\.html.*$/, '/');
      loadSrc(base + name + '/' + name + '.html');
    }

    function loadSrc(src) {
      if (currentSrc === src) return;
      currentSrc = src;
      var frame = document.getElementById('inner-frame');
      var overlay = document.getElementById('loading-overlay');
      overlay.style.display = 'flex';
      frame.style.display = 'none';
      frame.onload = function() {
        overlay.style.display = 'none';
        frame.style.display = 'block';
      };
      frame.src = src;
    }

    function unload() {
      currentSrc = null;
      var frame = document.getElementById('inner-frame');
      frame.src = '';
      frame.style.display = 'none';
      document.getElementById('loading-overlay').style.display = 'flex';
    }

    try {
      parent.postMessage(JSON.stringify({ channel: 'fshimReady' }), '*');
    } catch(_) {}
  </script>
</body>
</html>
