<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Media | xat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      background: #161b22;
      border-bottom: 1px solid #21262d;
      padding: 8px 10px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }
    .top-bar input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 6px 10px;
      font-size: 12px;
      outline: none;
    }
    .top-bar input:focus {
      border-color: #58a6ff;
    }
    .top-bar input::placeholder {
      color: #484f58;
    }
    .btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover { background: #30363d; }
    .btn.primary {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #fff;
    }
    .btn.primary:hover { background: #388bfd; }
    .video-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
      overflow: hidden;
    }
    .video-area iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .placeholder {
      text-align: center;
      color: #484f58;
      pointer-events: none;
    }
    .placeholder svg {
      width: 60px;
      height: 60px;
      fill: #21262d;
      margin-bottom: 12px;
    }
    .placeholder p {
      font-size: 13px;
    }
    .controls {
      background: #161b22;
      border-top: 1px solid #21262d;
      padding: 6px 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .controls .btn {
      padding: 5px 10px;
      font-size: 12px;
    }
    .volume-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      font-size: 11px;
      color: #8b949e;
    }
    .volume-row input[type=range] {
      width: 70px;
      accent-color: #1f6feb;
    }
    .status {
      font-size: 11px;
      color: #58a6ff;
      padding: 0 10px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .error { color: #f85149; }
  </style>
</head>
<body>
  <div class="top-bar">
    <input type="text" id="url-input" placeholder="Paste YouTube URL or video ID..." />
    <button class="btn primary" onclick="loadVideo()">Play</button>
    <button class="btn" onclick="clearVideo()">Clear</button>
  </div>

  <div class="video-area" id="video-area">
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M21.8 8s-.2-1.4-.8-2c-.8-.8-1.6-.8-2-.9C16.2 5 12 5 12 5s-4.2 0-7 .1c-.4.1-1.2.1-2 .9-.6.6-.8 2-.8 2S2 9.6 2 11.2v1.5c0 1.6.2 3.2.2 3.2s.2 1.4.8 2c.8.8 1.8.8 2.2.8C6.8 19 12 19 12 19s4.2 0 7-.1c.4-.1 1.2-.1 2-.9.6-.6.8-2 .8-2s.2-1.6.2-3.2v-1.5C22 9.6 21.8 8 21.8 8zM9.5 15V9l6.5 3-6.5 3z"/>
      </svg>
      <p>Paste a YouTube URL above and press Play</p>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="play-btn" onclick="resumeVideo()" disabled>&#9654; Resume</button>
    <button class="btn" id="pause-btn" onclick="pauseVideo()" disabled>&#9646;&#9646; Pause</button>
    <span class="status" id="status"></span>
    <div class="volume-row">
      <span>&#128264;</span>
      <input type="range" id="volume" min="0" max="100" value="80" oninput="updateVolume(this.value)">
      <span id="vol-label">80</span>
    </div>
  </div>

  <script>
    var player = null;
    var currentVideoId = null;

    // Check for ?link= param on load
    (function() {
      const params = new URLSearchParams(window.location.search);
      const link = params.get('link');
      if (link) {
        document.getElementById('url-input').value = link;
        loadVideo();
      }
    })();

    // Also listen for postMessage with a link
    window.addEventListener('message', function(e) {
      try {
        const data = JSON.parse(e.data);
        if (data && data.link) {
          document.getElementById('url-input').value = data.link;
          loadVideo();
        }
      } catch (_) {}
    });

    function extractVideoId(url) {
      url = url.trim();
      // Plain video ID (11 chars)
      if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
      // youtu.be/ID
      var m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
      if (m) return m[1];
      // youtube.com/watch?v=ID
      m = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
      if (m) return m[1];
      // youtube.com/embed/ID
      m = url.match(/\/embed\/([a-zA-Z0-9_-]{11})/);
      if (m) return m[1];
      return null;
    }

    function loadVideo() {
      const raw = document.getElementById('url-input').value.trim();
      if (!raw) return;

      const vid = extractVideoId(raw);
      if (!vid) {
        setStatus('Could not extract video ID from URL.', true);
        return;
      }

      currentVideoId = vid;
      const vol = document.getElementById('volume').value;
      const area = document.getElementById('video-area');
      document.getElementById('placeholder').style.display = 'none';

      var existing = document.getElementById('yt-frame');
      if (existing) existing.remove();

      const iframe = document.createElement('iframe');
      iframe.id = 'yt-frame';
      iframe.allow = 'autoplay; encrypted-media; fullscreen';
      iframe.allowFullscreen = true;
      iframe.src = 'https://www.youtube-nocookie.com/embed/' + vid +
        '?autoplay=1&rel=0&modestbranding=1&enablejsapi=1';
      area.appendChild(iframe);

      document.getElementById('play-btn').disabled = false;
      document.getElementById('pause-btn').disabled = false;
      setStatus('Playing: ' + vid);
    }

    function clearVideo() {
      var existing = document.getElementById('yt-frame');
      if (existing) existing.remove();
      document.getElementById('placeholder').style.display = '';
      document.getElementById('play-btn').disabled = true;
      document.getElementById('pause-btn').disabled = true;
      currentVideoId = null;
      setStatus('');
    }

    function resumeVideo() {
      var f = document.getElementById('yt-frame');
      if (f) {
        try { f.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*'); } catch(e){}
      }
    }

    function pauseVideo() {
      var f = document.getElementById('yt-frame');
      if (f) {
        try { f.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*'); } catch(e){}
      }
    }

    function updateVolume(v) {
      document.getElementById('vol-label').textContent = v;
      var f = document.getElementById('yt-frame');
      if (f) {
        try { f.contentWindow.postMessage('{"event":"command","func":"setVolume","args":[' + v + ']}', '*'); } catch(e){}
      }
    }

    function setStatus(msg, isError) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isError ? ' error' : '');
    }

    document.getElementById('url-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') loadVideo();
    });
  </script>
</body>
</html>
