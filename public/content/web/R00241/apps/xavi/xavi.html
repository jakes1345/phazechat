<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Xavi | xat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: #16213e;
      border-bottom: 1px solid #2a2a5e;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .avatar {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #1f6feb, #58a6ff);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .header-info .name {
      font-size: 14px;
      font-weight: bold;
      color: #a0c4ff;
    }
    .header-info .tagline {
      font-size: 10px;
      color: #7080a0;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .msg-row.user {
      flex-direction: row-reverse;
    }
    .msg-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .msg-avatar.bot-av  { background: linear-gradient(135deg, #1f6feb, #58a6ff); }
    .msg-avatar.user-av { background: #2a2a5e; }
    .bubble {
      max-width: 75%;
      padding: 7px 11px;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
    }
    .bubble.bot  { background: #16213e; border: 1px solid #2a2a5e; color: #c0d8ff; border-bottom-left-radius: 3px; }
    .bubble.user { background: #1f3a6e; border: 1px solid #2a4a8e; color: #e0e8ff; border-bottom-right-radius: 3px; }
    .typing {
      display: flex; gap: 4px; align-items: center; padding: 8px 12px;
    }
    .dot {
      width: 6px; height: 6px;
      background: #4a6fa5;
      border-radius: 50%;
      animation: bounce 1s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
    .input-row {
      background: #16213e;
      border-top: 1px solid #2a2a5e;
      padding: 8px 10px;
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .input-row input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #2a2a5e;
      border-radius: 20px;
      color: #e0e0e0;
      padding: 7px 14px;
      font-size: 12px;
      outline: none;
    }
    .input-row input:focus { border-color: #4a6fa5; }
    .input-row input::placeholder { color: #404060; }
    .send-btn {
      background: #1f6feb;
      border: none;
      border-radius: 50%;
      width: 34px; height: 34px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #388bfd; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a5e; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="avatar">&#x1F916;</div>
    <div class="header-info">
      <div class="name">Xavi</div>
      <div class="tagline">xat Virtual Assistant</div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-row">
    <input type="text" id="user-input" placeholder="Ask me anything about xat..." maxlength="200">
    <button class="send-btn" onclick="sendMsg()" title="Send">&#x27A4;</button>
  </div>

  <script>
    var KB = [
      { q: ['what is xat', 'what is this', 'explain xat'],
        a: 'xat is a free online chat platform where you can create chat rooms, collect powers, and connect with friends around the world.' },
      { q: ['what are xats', 'what is xat currency', 'coins'],
        a: 'Xats are the virtual currency of xat. You can use them to buy powers, subscribe, or trade with other users.' },
      { q: ['what are powers', 'power', 'powers'],
        a: 'Powers are special features you can unlock on xat! They include animated smilies, chat effects, profile customization, and more. Some powers are limited edition.' },
      { q: ['how to trade', 'trading', 'trade'],
        a: 'To trade, open the Trade app from the sidebar. You can offer xats and powers to another user and they can accept or counter your offer.' },
      { q: ['what is days', 'days', 'subscription'],
        a: 'Days are your xat subscription. With active days you can send messages in subscriber-only chats and unlock extra features.' },
      { q: ['how to get xats', 'earn xats', 'buy xats'],
        a: 'You can buy xats at xat.com, earn them through promotions, or trade with other users who have xats to spare.' },
      { q: ['what is a pawn', 'pawns', 'pawn'],
        a: 'Your pawn is your avatar on xat! You can customize its color, hat, and add effects with different powers.' },
      { q: ['how to change name', 'username', 'name'],
        a: 'You can change your display name in your xat account settings. Some name changes may require a name power.' },
      { q: ['what is doodle', 'doodle'],
        a: 'Doodle is a shared drawing app where chat users can draw together in real time. Open it from the Apps panel.' },
      { q: ['help', 'commands', 'what can you do'],
        a: 'I can answer questions about xat features like powers, xats, trading, chat rooms, and more. Just ask me anything!' },
      { q: ['hi', 'hello', 'hey', 'hiya', 'sup'],
        a: 'Hey there! I\'m Xavi, your xat assistant. How can I help you today?' },
      { q: ['bye', 'goodbye', 'cya', 'later'],
        a: 'See you later! Come back any time you have questions. Enjoy xat!' },
      { q: ['thanks', 'thank you', 'thx'],
        a: 'You\'re welcome! Let me know if you need anything else.' },
      { q: ['who made xat', 'xat history', 'creator'],
        a: 'xat was created in 2006 and has grown into one of the most unique chat platforms online, known especially for its powers system.' },
      { q: ['what is media', 'media player', 'youtube'],
        a: 'The Media app lets you watch YouTube videos together in the chat sidebar. Paste a YouTube URL and everyone can watch along!' },
      { q: ['what is snake', 'snake game', 'snakerace'],
        a: 'Snake Race is a classic snake game available in the apps panel. Use arrow keys to steer your snake and eat food to grow!' },
    ];

    var DEFAULT_RESPONSE = "I'm not sure about that one. Try asking about xat features, powers, trading, or games!";

    function findAnswer(text) {
      text = text.toLowerCase().trim();
      for (var i = 0; i < KB.length; i++) {
        for (var j = 0; j < KB[i].q.length; j++) {
          if (text.includes(KB[i].q[j])) return KB[i].a;
        }
      }
      return DEFAULT_RESPONSE;
    }

    function addMsg(text, type) {
      var msgs = document.getElementById('messages');
      var row = document.createElement('div');
      row.className = 'msg-row ' + (type === 'user' ? 'user' : 'bot');
      var av = document.createElement('div');
      av.className = 'msg-avatar ' + (type === 'user' ? 'user-av' : 'bot-av');
      av.textContent = type === 'user' ? String.fromCodePoint(0x1F464) : String.fromCodePoint(0x1F916);
      var bubble = document.createElement('div');
      bubble.className = 'bubble ' + type;
      bubble.textContent = text;
      if (type === 'user') { row.appendChild(bubble); row.appendChild(av); }
      else { row.appendChild(av); row.appendChild(bubble); }
      msgs.appendChild(row);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function showTyping() {
      var msgs = document.getElementById('messages');
      var row = document.createElement('div');
      row.className = 'msg-row bot';
      row.id = 'typing-row';
      var av = document.createElement('div');
      av.className = 'msg-avatar bot-av';
      av.textContent = String.fromCodePoint(0x1F916);
      var typing = document.createElement('div');
      typing.className = 'typing bubble bot';
      typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      row.appendChild(av); row.appendChild(typing);
      msgs.appendChild(row);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function removeTyping() {
      var el = document.getElementById('typing-row');
      if (el) el.remove();
    }

    function sendMsg() {
      var input = document.getElementById('user-input');
      var text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMsg(text, 'user');
      showTyping();
      var answer = findAnswer(text);
      setTimeout(function() {
        removeTyping();
        addMsg(answer, 'bot');
      }, 500 + Math.random() * 500);
    }

    document.getElementById('user-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendMsg();
    });

    // Welcome message
    window.addEventListener('load', function() {
      setTimeout(function() {
        addMsg('Hi! I\'m Xavi, your xat assistant. Ask me about powers, trading, games, or anything xat-related!', 'bot');
      }, 300);
    });
  </script>
</body>
</html>
