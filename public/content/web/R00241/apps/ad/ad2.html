<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ad | xat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0d1117;
      color: #8b949e;
      font-family: Arial, sans-serif;
    }
    #ad-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .ad-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #484f58;
      border: 1px solid #21262d;
      padding: 2px 8px;
      border-radius: 3px;
    }
    .ad-placeholder {
      width: 300px;
      height: 250px;
      background: #161b22;
      border: 1px dashed #30363d;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #30363d;
    }
    .ad-placeholder svg {
      width: 48px; height: 48px;
      fill: #21262d;
    }
    .ad-placeholder p {
      font-size: 12px;
      color: #30363d;
      text-align: center;
    }
    #ad-slot {
      display: none;
    }
  </style>
</head>
<body>
  <div id="ad-container">
    <div class="ad-label">Advertisement</div>
    <div class="ad-placeholder" id="ad-placeholder">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-7l-3 3.72L9 13l-3 4h12l-4-4z"/>
      </svg>
      <p>Ad content loads here</p>
    </div>
    <div id="ad-slot"></div>
  </div>

  <script>
    // Listen for ad content via postMessage
    window.addEventListener('message', function(e) {
      var data;
      try { data = JSON.parse(e.data); } catch(_) { return; }
      if (!data) return;

      if (data.adHtml) {
        document.getElementById('ad-placeholder').style.display = 'none';
        var slot = document.getElementById('ad-slot');
        slot.style.display = 'block';
        slot.innerHTML = data.adHtml;
      }
    });

    // Signal ready
    try {
      parent.postMessage(JSON.stringify({ channel: 'adReady' }), '*');
    } catch(_) {}
  </script>
</body>
</html>
