<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trade | xat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      font-size: 13px;
      height: 100vh;
      overflow-y: auto;
    }
    h1 {
      text-align: center;
      font-size: 15px;
      padding: 10px 0 6px;
      color: #a0c4ff;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid #2a2a4a;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      font-size: 11px;
      color: #7080a0;
      padding: 4px 0 10px;
    }
    .trade-container {
      display: flex;
      gap: 8px;
      padding: 0 10px 10px;
    }
    .offer-col {
      flex: 1;
      background: #16213e;
      border: 1px solid #2a2a5e;
      border-radius: 8px;
      padding: 8px;
    }
    .offer-col h2 {
      font-size: 12px;
      color: #a0c4ff;
      text-align: center;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #2a2a5e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field-group {
      margin-bottom: 8px;
    }
    .field-group label {
      display: block;
      font-size: 10px;
      color: #8090b0;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field-group input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #2a2a5e;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 5px 7px;
      font-size: 12px;
      outline: none;
    }
    .field-group input:focus {
      border-color: #4a6fa5;
    }
    .powers-list {
      background: #0d1117;
      border: 1px solid #2a2a5e;
      border-radius: 4px;
      min-height: 60px;
      max-height: 90px;
      overflow-y: auto;
      padding: 4px;
      margin-bottom: 4px;
    }
    .power-tag {
      display: inline-block;
      background: #1e3a5f;
      border: 1px solid #3a5a8f;
      border-radius: 3px;
      padding: 2px 6px;
      font-size: 10px;
      margin: 2px;
      color: #a0d0ff;
      cursor: pointer;
      user-select: none;
    }
    .power-tag:hover {
      background: #2a4a6f;
    }
    .power-tag .remove {
      color: #ff7070;
      margin-left: 4px;
      font-weight: bold;
    }
    .empty-powers {
      color: #404060;
      font-size: 10px;
      font-style: italic;
      text-align: center;
      padding: 10px 0;
    }
    .add-power-row {
      display: flex;
      gap: 4px;
    }
    .add-power-row input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #2a2a5e;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 4px 6px;
      font-size: 11px;
      outline: none;
    }
    .add-power-row input:focus {
      border-color: #4a6fa5;
    }
    .btn-small {
      background: #1e3a5f;
      border: 1px solid #3a5a8f;
      color: #a0d0ff;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-small:hover {
      background: #2a4a6f;
    }
    .status-row {
      padding: 6px 10px;
      background: #12122a;
      border-top: 1px solid #2a2a4a;
      border-bottom: 1px solid #2a2a4a;
      font-size: 11px;
      color: #7080a0;
      text-align: center;
      min-height: 26px;
    }
    .status-row.active { color: #60c0ff; }
    .status-row.error  { color: #ff7070; }
    .status-row.ok     { color: #70d070; }
    .btn-send {
      display: block;
      width: calc(100% - 20px);
      margin: 10px;
      padding: 10px;
      background: #1e5f3a;
      border: 1px solid #3a8f5a;
      border-radius: 6px;
      color: #70d090;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: background 0.15s;
    }
    .btn-send:hover {
      background: #28703f;
    }
    .btn-send:disabled {
      background: #1a2e22;
      border-color: #2a3a2e;
      color: #405040;
      cursor: not-allowed;
    }
    .cancel-btn {
      display: block;
      width: calc(100% - 20px);
      margin: 0 10px 10px;
      padding: 7px;
      background: #2e1a1a;
      border: 1px solid #5e2a2a;
      border-radius: 6px;
      color: #d07070;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }
    .cancel-btn:hover { background: #3e2020; }
  </style>
</head>
<body>
  <h1>Trade</h1>
  <p class="subtitle">Trade xats and powers with other users</p>

  <div class="trade-container">
    <!-- Your Offer -->
    <div class="offer-col">
      <h2>Your Offer</h2>
      <div class="field-group">
        <label>Xats</label>
        <input type="number" id="your-xats" min="0" value="0" placeholder="0">
      </div>
      <div class="field-group">
        <label>Powers</label>
        <div class="powers-list" id="your-powers">
          <div class="empty-powers">No powers added</div>
        </div>
        <div class="add-power-row">
          <input type="text" id="your-power-input" placeholder="Power name...">
          <button class="btn-small" onclick="addPower('your')">Add</button>
        </div>
      </div>
    </div>

    <!-- Their Offer -->
    <div class="offer-col">
      <h2>Their Offer</h2>
      <div class="field-group">
        <label>Xats</label>
        <input type="number" id="their-xats" min="0" value="0" placeholder="0">
      </div>
      <div class="field-group">
        <label>Powers</label>
        <div class="powers-list" id="their-powers">
          <div class="empty-powers">No powers added</div>
        </div>
        <div class="add-power-row">
          <input type="text" id="their-power-input" placeholder="Power name...">
          <button class="btn-small" onclick="addPower('their')">Add</button>
        </div>
      </div>
    </div>
  </div>

  <div class="status-row" id="status">Ready to trade</div>
  <button class="btn-send" id="send-btn" onclick="sendTradeRequest()">Send Trade Request</button>
  <button class="cancel-btn" onclick="cancelTrade()">Cancel</button>

  <script>
    const yourPowers = [];
    const theirPowers = [];

    function renderPowers(side, arr) {
      const el = document.getElementById(side + '-powers');
      if (arr.length === 0) {
        el.innerHTML = '<div class="empty-powers">No powers added</div>';
        return;
      }
      el.innerHTML = arr.map((p, i) =>
        '<span class="power-tag">' + escHtml(p) +
        '<span class="remove" onclick="removePower(\'' + side + '\',' + i + ')">x</span></span>'
      ).join('');
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addPower(side) {
      const input = document.getElementById(side + '-power-input');
      const val = input.value.trim();
      if (!val) return;
      (side === 'your' ? yourPowers : theirPowers).push(val);
      input.value = '';
      renderPowers(side, side === 'your' ? yourPowers : theirPowers);
    }

    function removePower(side, idx) {
      (side === 'your' ? yourPowers : theirPowers).splice(idx, 1);
      renderPowers(side, side === 'your' ? yourPowers : theirPowers);
    }

    document.getElementById('your-power-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addPower('your');
    });
    document.getElementById('their-power-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addPower('their');
    });

    function sendTradeRequest() {
      const yourXats = parseInt(document.getElementById('your-xats').value) || 0;
      const theirXats = parseInt(document.getElementById('their-xats').value) || 0;

      if (yourXats === 0 && yourPowers.length === 0) {
        setStatus('You must offer something.', 'error');
        return;
      }

      const tradeData = {
        action: 'trade',
        yourXats,
        yourPowers: yourPowers.slice(),
        theirXats,
        theirPowers: theirPowers.slice()
      };

      try {
        parent.postMessage(JSON.stringify(tradeData), '*');
      } catch (e) {}

      setStatus('Trade request sent!', 'ok');
      document.getElementById('send-btn').disabled = true;
    }

    function cancelTrade() {
      try {
        parent.postMessage(JSON.stringify({ action: 'cancelTrade' }), '*');
        parent.startSide('');
      } catch (e) {}
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status-row ' + (type || '');
    }
  </script>
</body>
</html>
